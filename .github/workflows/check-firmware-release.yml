name: Check firmware release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/
            /scripts/
            /state/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests urllib3 fake-useragent tqdm

      - name: Check new firmware
        id: sync
        env:
          IKUAI_PROXY: ""
        run: |
          python scripts/ikuai_firmware_download.py check-release --release-dir .release

      - name: Download dev firmware
        id: dev
        run: |
          mkdir -p .release
          set +e
          python scripts/dev_download.py all 2>&1 | tee .release/dev-download.log
          status=${PIPESTATUS[0]}
          grep '^downloaded: ' .release/dev-download.log | sed 's/^downloaded: //' > .release/dev-assets.txt || true
          if [ -s .release/dev-assets.txt ]; then
            echo 'has_updates=true' >> "$GITHUB_OUTPUT"
          else
            echo 'has_updates=false' >> "$GITHUB_OUTPUT"
          fi
          {
            echo 'assets<<__ASSETS__'
            cat .release/dev-assets.txt
            echo '__ASSETS__'
          } >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "::warning::dev_download.py exited with status $status; continuing with downloaded assets"
          fi

      - name: Prepare release metadata
        id: release
        env:
          SYNC_HAS_UPDATES: ${{ steps.sync.outputs.has_updates }}
          SYNC_RELEASE_NOTES: ${{ steps.sync.outputs.release_notes }}
          SYNC_TAG_NAME: ${{ steps.sync.outputs.tag_name }}
          SYNC_RELEASE_NAME: ${{ steps.sync.outputs.release_name }}
          DEV_HAS_UPDATES: ${{ steps.dev.outputs.has_updates }}
        run: |
          mkdir -p .release
          if [ "$SYNC_HAS_UPDATES" != "true" ] && [ "$DEV_HAS_UPDATES" != "true" ]; then
            echo 'has_updates=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$SYNC_HAS_UPDATES" = "true" ]; then
            release_notes="$SYNC_RELEASE_NOTES"
            tag_name="$SYNC_TAG_NAME"
            release_name="$SYNC_RELEASE_NAME"
            if [ -s .release/dev-assets.txt ]; then
              {
                echo
                echo "开发服务器固件:"
                sed 's/^/- /' .release/dev-assets.txt
              } >> "$release_notes"
            fi
          else
            timestamp="$(date -u +'%Y%m%dT%H%M%SZ')"
            release_notes=".release/release-notes.md"
            tag_name="ikuai-dev-firmware-$timestamp"
            release_name="iKuai dev firmware $timestamp"
            {
              echo "发布日期: $timestamp"
              echo
              echo "开发服务器固件:"
              sed 's/^/- /' .release/dev-assets.txt
            } > "$release_notes"
          fi

          {
            echo 'has_updates=true'
            echo "release_notes=$release_notes"
            echo "tag_name=$tag_name"
            echo "release_name=$release_name"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.release.outputs.has_updates == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: ${{ steps.release.outputs.release_name }}
          body_path: ${{ steps.release.outputs.release_notes }}
          files: |
            ${{ steps.sync.outputs.assets }}
            ${{ steps.dev.outputs.assets }}

      - name: Commit firmware and metadata
        if: steps.release.outputs.has_updates == 'true'
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add --sparse firmware state/device_map.json state/update_contents.json
          if git diff --cached --quiet; then
            exit 0
          fi

          git diff --cached --name-only -z > .release/staged-files.z
          python - <<'PY'
          from pathlib import Path

          limit = 700 * 1024 * 1024
          data = Path(".release/staged-files.z").read_bytes()
          files = [item.decode() for item in data.split(b"\0") if item]
          batches = []
          current = []
          current_size = 0

          for path in files:
              size = Path(path).stat().st_size if Path(path).exists() else 0
              if current and current_size + size > limit:
                  batches.append(current)
                  current = []
                  current_size = 0
              current.append(path)
              current_size += size

          if current:
              batches.append(current)

          for index, batch in enumerate(batches, start=1):
              Path(f".release/commit-batch-{index:02d}.txt").write_text(
                  "\n".join(batch) + "\n",
                  encoding="utf-8",
              )
          Path(".release/commit-batch-count.txt").write_text(str(len(batches)), encoding="utf-8")
          PY

          count="$(cat .release/commit-batch-count.txt)"
          branch="${GITHUB_REF_NAME:-main}"
          git reset --quiet HEAD
          for batch in $(seq 1 "$count"); do
            file=".release/commit-batch-$(printf '%02d' "$batch").txt"
            git add --sparse --pathspec-from-file="$file"
            git commit -m "chore: update firmware assets for ${{ steps.release.outputs.tag_name }} batch $(printf '%02d' "$batch")"
            git push origin "HEAD:$branch"
          done
